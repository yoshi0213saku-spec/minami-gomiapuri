<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>南相木村ごみナビ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-green: #2d5a27;
            --burnable: #ff6b6b;
            --non-burnable: #4d96ff;
            --plastic: #ffd93d;
            --koshi: #6bc11f;
            --can-bin: #fd9644;
            --hazardous: #a555ec;
            --sodai: #4b6584;
        }
        body {
            background-color: #f7fbf2;
            font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
            color: #2d3436;
        }
        .app-header {
            background: linear-gradient(135deg, #4b7931 0%, #2d5a27 100%);
            padding-bottom: 1.25rem;
            border-radius: 0 0 30px 30px;
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .main-card {
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            background: white;
            border: 2px solid #eef5e9;
        }
        .month-slider {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
            -ms-overflow-style: none;
            scroll-behavior: smooth;
        }
        .month-slider::-webkit-scrollbar { display: none; }
        .month-page {
            flex: 0 0 100%;
            width: 100%;
            scroll-snap-align: start;
            padding: 0 1rem;
            box-sizing: border-box;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .calendar-item {
            padding: 12px;
            background: white;
            border-radius: 18px;
            border: 1px solid #edf2f7;
            transition: transform 0.1s;
        }
        .month-tab {
            padding: 6px 18px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 900;
            color: white;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.2s;
            white-space: nowrap;
        }
        .month-tab.active {
            background: white !important;
            color: var(--primary-green) !important;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .month-scroll-container {
            display: flex;
            overflow-x: auto;
            gap: 8px;
            padding: 4px 16px;
            scrollbar-width: none;
        }
        .type-icon {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
        .bag-indicator {
            width: 12px;
            height: 12px;
            border-radius: 3px;
            display: inline-block;
            margin-right: 4px;
            border: 1px solid rgba(0,0,0,0.1);
        }
        .bg-burnable { background-color: var(--burnable); }
        .bg-non-burnable { background-color: var(--non-burnable); }
        .bg-plastic { background-color: var(--plastic); color: #444; }
        .bg-koshi { background-color: var(--koshi); }
        .bg-can-bin { background-color: var(--can-bin); }
        .bg-hazardous { background-color: var(--hazardous); }
        .bg-sodai { background-color: var(--sodai); }
        .bg-none { background-color: #f1f5f9; color: #cbd5e1; }
        .search-container {
            background: white;
            border-radius: 20px;
            border: 3px solid #eef5e9;
        }
        .year-indicator {
            font-size: 0.55rem;
            display: block;
            opacity: 0.8;
            margin-bottom: -1px;
        }
        html { scroll-behavior: smooth; }
    </style>
</head>
<body class="min-h-screen">
    <header class="app-header pt-4 text-white text-center">
        <div class="flex justify-between items-center mb-4 px-6">
            <div class="w-8"></div>
            <h1 class="text-xl font-black tracking-widest text-white">南相木村ごみナビ</h1>
            <button onclick="resetToToday()" class="p-2 opacity-80 active:opacity-100"><i class="fas fa-home text-lg"></i></button>
        </div>
        <div class="month-scroll-container mb-4" id="month-tabs"></div>
        <div class="flex justify-around items-center px-4 gap-2 mb-3">
            <a href="tel:0267-78-2121" class="flex-1 flex flex-col items-center bg-white/10 rounded-2xl py-2 active:bg-white/20"><span class="text-[9px] opacity-70 mb-0.5">役場 住民課</span><span class="text-[11px] font-black">0267-78-2121</span></a>
            <div class="flex-1 flex flex-col items-center bg-white/10 rounded-2xl py-2"><span class="text-[9px] opacity-70 mb-0.5">収集時間</span><span class="text-[11px] font-black">朝6:00〜8:30</span></div>
        </div>
        <div class="flex justify-around items-center px-4 gap-2">
            <div class="flex-1 flex items-center justify-center bg-white/10 rounded-2xl py-2"><i class="fas fa-exclamation-triangle text-hazardous mr-1.5 text-[10px]"></i><span class="text-[10px] font-bold">有害ごみ: 役場窓口へ</span></div>
            <div class="flex-1 flex items-center justify-center bg-white/10 rounded-2xl py-2"><i class="fas fa-truck text-blue-300 mr-1.5 text-[10px]"></i><span class="text-[10px] font-bold">粗大ごみ: 5/9など</span></div>
        </div>
    </header>
    <main class="mt-6">
        <section class="px-5 mb-8">
            <p class="text-[11px] font-bold text-gray-500 mb-2 leading-relaxed text-center px-2">分別で分からない場合は、下記で検索し、<br class="sm:hidden">それでも不明な場合は住民課へお問い合わせください。</p>
            <div class="search-container flex items-center px-4 py-1 shadow-sm"><i class="fas fa-search text-gray-300 ml-1 text-xl"></i><input type="text" id="search-input" placeholder="なにを捨てたいですか？" class="w-full p-4 text-base font-bold focus:outline-none bg-transparent"></div>
            <div id="search-results" class="mt-4 space-y-4 hidden px-1"></div>
        </section>
        <section id="today-section" class="px-5 mb-10">
            <div class="main-card p-6 border-b-4 border-green-200">
                <div class="flex items-center justify-between mb-5"><span class="text-gray-600 font-black text-lg" id="today-display">--/--（-）</span><span class="bg-red-500 text-white text-[10px] font-black px-4 py-1 rounded-full shadow-sm">今日</span></div>
                <div id="today-content" class="flex flex-col items-center gap-4"></div>
                <div class="mt-6 pt-4 border-t-2 border-dashed border-gray-100 flex items-center justify-center text-[11px] text-gray-400 font-bold"><i class="fas fa-arrows-alt-h mr-2"></i> 左右にめくるとカレンダーが見れます <i class="fas fa-arrows-alt-h ml-2"></i></div>
            </div>
        </section>
        <section class="mb-12"><div class="month-slider" id="month-slider"></div></section>
    </main>
    <footer class="pb-8 text-center opacity-40"><p class="text-[10px] font-black uppercase tracking-widest">Minamiaiki Digital Museum Project</p></footer>
    <div style="text-align: center; margin-bottom: 40px;"><a href="https://yoshi0213saku-spec.github.io/minami-gomiapuri/"><img src="minami-gominavi.png" alt="南相木村ごみナビ" style="width:200px;"></a></div>
    <script>
        const CONFIG = {specialRules: {"2026-05-09": { label: "粗大ごみ", type: "sodai" },"2025-12-29": { label: "可燃ごみ", type: "burnable" },"2025-12-30": { label: "可燃ごみ", type: "burnable" },"2026-01-04": { label: "臨時収集", type: "burnable" },"2026-12-29": { label: "可燃ごみ", type: "burnable" },"2026-12-30": { label: "可燃ごみ", type: "burnable" },"2027-01-04": { label: "臨時収集", type: "burnable" }}};
        const DICTIONARY = [{ name: "生ごみ", type: "burnable", label: "可燃ごみ", bag: "指定の袋", note: "毎週月曜日。" },{ name: "ビデオテープ", type: "non-burnable", label: "不燃ごみ", bag: "透明な袋" },{ name: "乾電池", type: "hazardous", label: "有害ごみ", bag: "役場窓口" },{ name: "プラスチック製容器包装", type: "plastic", label: "プラスチック類" },{ name: "トレイ・パック", type: "plastic", label: "プラスチック類" },{ name: "新聞紙・チラシ", type: "koshi", label: "古紙類" },{ name: "雑誌・本", type: "koshi", label: "古紙類" },{ name: "ダンボール", type: "koshi", label: "古紙類" },{ name: "飲料缶", type: "can-bin", label: "缶・びん" },{ name: "空きびん", type: "can-bin", label: "缶・びん" },{ name: "スプレー缶", type: "hazardous", label: "有害ごみ" },{ name: "ライター", type: "hazardous", label: "有害ごみ" },{ name: "蛍光管・電球", type: "hazardous", label: "有害ごみ" },{ name: "小型家電", type: "non-burnable", label: "不燃ごみ" },{ name: "タンス・机", type: "sodai", label: "粗大ごみ" }];
        const REAL_TODAY = new Date();
        const monthSlider = document.getElementById('month-slider');
        const monthTabsContainer = document.getElementById('month-tabs');
        const dayNames = ["日", "月", "火", "水", "木", "金", "土"];
        function getIcons(type) { switch(type) { case 'burnable': return '<i class="fas fa-fire text-sm"></i>'; case 'non-burnable': return '<i class="fas fa-dumpster text-sm"></i>'; case 'plastic': return '<i class="fas fa-recycle text-sm"></i>'; case 'koshi': return '<i class="fas fa-book text-sm"></i>'; case 'can-bin': return '<i class="fas fa-wine-bottle text-sm"></i>'; case 'hazardous': return '<i class="fas fa-exclamation-triangle text-sm"></i>'; case 'sodai': return '<i class="fas fa-truck text-sm"></i>'; default: return '<i class="fas fa-calendar-times text-sm"></i>'; } }
        function getBagColor(type) { switch(type) { case 'burnable': return '#ff6b6b'; case 'non-burnable': return '#4d96ff'; case 'plastic': return '#ffd93d'; case 'koshi': return '#6bc11f'; case 'can-bin': return '#fd9644'; case 'hazardous': return '#a555ec'; case 'sodai': return '#4b6584'; default: return '#ccc'; } }
        function getGarbageTypes(dateStr) { const date = new Date(dateStr); const day = date.getDay(); const d = date.getDate(); const nth = Math.ceil(d / 7); if (CONFIG.specialRules[dateStr]) return [CONFIG.specialRules[dateStr]]; let results = []; if (day === 1) results.push({ label: "可燃ごみ", type: "burnable", bag: "指定袋" }); if (day === 2 && nth === 1) results.push({ label: "不燃ごみ", type: "non-burnable", bag: "透明袋" }); if (day === 3 && nth === 1) results.push({ label: "古紙類", type: "koshi", bag: "紐で縛る" }); if (day === 3 && (nth === 2 || nth === 4)) results.push({ label: "プラ類", type: "plastic", bag: "" }); if (day === 3 && nth === 3) results.push({ label: "缶・びん", type: "can-bin", bag: "" }); return results.length > 0 ? results : [{ label: "収集なし", type: "none" }]; }
        function initApp() { const todayStr = `${REAL_TODAY.getFullYear()}-${String(REAL_TODAY.getMonth()+1).padStart(2,'0')}-${String(REAL_TODAY.getDate()).padStart(2,'0')}`; const displayDate = document.getElementById('today-display'); if (displayDate) displayDate.innerText = `${REAL_TODAY.getMonth()+1}/${REAL_TODAY.getDate()}（${dayNames[REAL_TODAY.getDay()]}）`; renderToday(getGarbageTypes(todayStr)); monthSlider.innerHTML = ''; monthTabsContainer.innerHTML = ''; let tempDate = new Date(REAL_TODAY.getFullYear(), REAL_TODAY.getMonth(), 1); for (let i = 0; i < 12; i++) { const y = tempDate.getFullYear(), m = tempDate.getMonth(); const btn = document.createElement('button'); btn.className = `month-tab`; btn.innerHTML = `<span class="year-indicator">${y}</span>${m + 1}月`; btn.onclick = () => scrollToMonth(i); monthTabsContainer.appendChild(btn); const page = document.createElement('div'); page.className = 'month-page'; let html = `<div class="mb-5 px-1"><h2 class="text-gray-800 font-black text-lg">${y}年 ${m + 1}月</h2></div><div class="calendar-grid">`; const lastDay = new Date(y, m + 1, 0).getDate(); for (let d = 1; d <= lastDay; d++) { const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; const types = getGarbageTypes(dateStr); const dayNum = new Date(y, m, d).getDay(); const color = dayNum === 0 ? 'text-red-500' : (dayNum === 6 ? 'text-blue-500' : 'text-gray-400'); html += `<div class="calendar-item ${dateStr === todayStr ? 'ring-4 ring-[#2d5a27]/20 border-[#2d5a27]' : ''}"><div class="font-black text-xs mb-3 ${color}">${m + 1}/${d}（${dayNames[dayNum]}）</div><div class="space-y-2">${types.map(t => `<div class="flex items-center gap-1"><div class="type-icon bg-${t.type} text-white">${getIcons(t.type)}</div><div class="flex flex-col"><span class="text-[10px] font-black leading-tight">${t.label}</span></div></div>`).join('')}</div></div>`; } page.innerHTML = html + `</div>`; monthSlider.appendChild(page); tempDate.setMonth(tempDate.getMonth() + 1); } updateActiveTab(0); }
        function renderToday(types) { const container = document.getElementById('today-content'); if (!container) return; container.innerHTML = types.map(t => { if (t.type === 'none') return `<i class="fas fa-bed text-4xl text-gray-200 mb-2"></i><span class="text-xl font-black text-gray-300">今日は収集なし</span>`; return `<div class="flex flex-col items-center w-full"><div class="w-20 h-20 bg-${t.type} rounded-full flex items-center justify-center text-white text-3xl shadow-lg mb-2">${getIcons(t.type).replace('text-sm','text-3xl')}</div><span class="text-2xl font-black">${t.label}</span>${t.bag ? `<div class="mt-2 flex items-center bg-gray-50 px-4 py-1 rounded-full text-sm font-bold text-gray-500 border border-gray-100"><span class="bag-indicator" style="background:${getBagColor(t.type)}"></span>${t.bag}で出してください</div>` : ''}</div>`; }).join(''); }
        function scrollToMonth(index) { monthSlider.scrollTo({ left: monthSlider.clientWidth * index, behavior: 'smooth' }); }
        function resetToToday() { scrollToMonth(0); }
        monthSlider.addEventListener('scroll', () => updateActiveTab(Math.round(monthSlider.scrollLeft / monthSlider.clientWidth)), { passive: true });
        function updateActiveTab(index) { const tabs = document.querySelectorAll('.month-tab'); tabs.forEach((tab, i) => { if (i === index) { tab.classList.add('active'); tab.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' }); } else tab.classList.remove('active'); }); }
        const searchInput = document.getElementById('search-input'), searchResults = document.getElementById('search-results');
        if (searchInput && searchResults) { searchInput.addEventListener('input', (e) => { const val = e.target.value.trim(); if (val.length === 0) { searchResults.classList.add('hidden'); return; } const filtered = DICTIONARY.filter(i => i.name.includes(val) || i.label.includes(val)); searchResults.classList.remove('hidden'); searchResults.innerHTML = filtered.map(i => `<div class="main-card p-4 flex items-center gap-4"><div class="w-14 h-14 bg-${i.type} rounded-2xl flex items-center justify-center text-white text-2xl">${getIcons(i.type).replace('text-sm','text-2xl')}</div><div class="flex-1"><div class="flex justify-between items-start"><h3 class="font-black text-lg">${i.name}</h3><span class="text-[10px] font-black bg-${i.type} px-2 py-0.5 rounded text-white">${i.label}</span></div>${i.bag ? `<div class="mt-1 flex items-center text-xs font-bold text-gray-400"><span class="bag-indicator" style="background:${getBagColor(i.type)}"></span>${i.bag}</div>` : ''}<p class="text-[10px] text-gray-500 mt-1">${i.note || ''}</p></div></div>`).join('') || '<div class="text-center py-10 opacity-30 font-black">見つかりませんでした</div>'; }); }
        window.onload = initApp;
    </script>
</body>
</html>
