<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>南相木村ごみナビ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-green: #2d5a27;
            --burnable: #ff6b6b;
            --non-burnable: #4d96ff;
            --plastic: #ffd93d;
            --koshi: #6bc11f;
            --can-bin: #fd9644;
            --hazardous: #a555ec;
            --sodai: #4b6584;
        }
        body {
            background-color: #f7fbf2;
            font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
            color: #2d3436;
        }
        .app-header {
            background: linear-gradient(135deg, #4b7931 0%, #2d5a27 100%);
            padding-bottom: 1.25rem;
            border-radius: 0 0 30px 30px;
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .main-card {
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            background: white;
            border: 2px solid #eef5e9;
        }
        .month-slider {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
            -ms-overflow-style: none;
            scroll-behavior: smooth;
        }
        .month-slider::-webkit-scrollbar { display: none; }
        .month-page {
            flex: 0 0 100%;
            width: 100%;
            scroll-snap-align: start;
            padding: 0 1rem;
            box-sizing: border-box;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .calendar-item {
            padding: 12px;
            background: white;
            border-radius: 18px;
            border: 1px solid #edf2f7;
            transition: transform 0.1s;
        }
        .month-tab {
            padding: 6px 18px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 900;
            color: white;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.2s;
            white-space: nowrap;
        }
        .month-tab.active {
            background: white !important;
            color: var(--primary-green) !important;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .month-scroll-container {
            display: flex;
            overflow-x: auto;
            gap: 8px;
            padding: 4px 16px;
            scrollbar-width: none;
        }
        .type-icon {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
        .bag-indicator {
            width: 12px;
            height: 12px;
            border-radius: 3px;
            display: inline-block;
            margin-right: 4px;
            border: 1px solid rgba(0,0,0,0.1);
        }
        .bg-burnable { background-color: var(--burnable); }
        .bg-non-burnable { background-color: var(--non-burnable); }
        .bg-plastic { background-color: var(--plastic); color: #444; }
        .bg-koshi { background-color: var(--koshi); }
        .bg-can-bin { background-color: var(--can-bin); }
        .bg-hazardous { background-color: var(--hazardous); }
        .bg-sodai { background-color: var(--sodai); }
        .bg-none { background-color: #f1f5f9; color: #cbd5e1; }
        
        .search-container {
            background: white;
            border-radius: 20px;
            border: 3px solid #eef5e9;
        }
        .year-indicator {
            font-size: 0.55rem;
            display: block;
            opacity: 0.8;
            margin-bottom: -1px;
        }
        html { scroll-behavior: smooth; }
    </style>
</head>
<body class="min-h-screen">

    <header class="app-header pt-4 text-white text-center">
        <div class="flex justify-between items-center mb-4 px-6">
            <div class="w-8"></div>
            <h1 class="text-xl font-black tracking-widest text-white">南相木村ごみナビ</h1>
            <button onclick="resetToToday()" class="p-2 opacity-80 active:opacity-100">
                <i class="fas fa-home text-lg"></i>
            </button>
        </div>
        
        <div class="month-scroll-container mb-4" id="month-tabs"></div>

        <div class="flex justify-around items-center px-4 gap-2 mb-3">
            <a href="tel:0267-78-2121" class="flex-1 flex flex-col items-center bg-white/10 rounded-2xl py-2 active:bg-white/20">
                <span class="text-[9px] opacity-70 mb-0.5">役場 住民課</span>
                <span class="text-[11px] font-black">0267-78-2121</span>
            </a>
            <div class="flex-1 flex flex-col items-center bg-white/10 rounded-2xl py-2">
                <span class="text-[9px] opacity-70 mb-0.5">収集時間</span>
                <span class="text-[11px] font-black">朝6:00〜8:30</span>
            </div>
        </div>

        <div class="flex justify-around items-center px-4 gap-2">
            <div class="flex-1 flex items-center justify-center bg-white/10 rounded-2xl py-2">
                <i class="fas fa-exclamation-triangle text-hazardous mr-1.5 text-[10px]"></i>
                <span class="text-[10px] font-bold">有害ごみ: 役場窓口へ</span>
            </div>
            <div class="flex-1 flex items-center justify-center bg-white/10 rounded-2xl py-2">
                <i class="fas fa-truck text-blue-300 mr-1.5 text-[10px]"></i>
                <span class="text-[10px] font-bold">粗大ごみ: 5/9など</span>
            </div>
        </div>
    </header>

    <main class="mt-6">
        <section class="px-5 mb-8">
            <p class="text-[11px] font-bold text-gray-500 mb-2 leading-relaxed text-center px-2">
                分別で分からない場合は、下記で検索し、<br class="sm:hidden">それでも不明な場合は住民課へお問い合わせください。
            </p>
            <div class="search-container flex items-center px-4 py-1 shadow-sm">
                <i class="fas fa-search text-gray-300 ml-1 text-xl"></i>
                <input type="text" id="search-input" placeholder="なにを捨てたいですか？" 
                       class="w-full p-4 text-base font-bold focus:outline-none bg-transparent">
            </div>
            <div id="search-results" class="mt-4 space-y-4 hidden px-1"></div>
        </section>

        <section id="today-section" class="px-5 mb-10">
            <div class="main-card p-6 border-b-4 border-green-200">
                <div class="flex items-center justify-between mb-5">
                    <span class="text-gray-600 font-black text-lg" id="today-display">--/--（-）</span>
                    <span class="bg-red-500 text-white text-[10px] font-black px-4 py-1 rounded-full shadow-sm">今日</span>
                </div>
                <div id="today-content" class="flex flex-col items-center gap-4"></div>
                <div class="mt-6 pt-4 border-t-2 border-dashed border-gray-100 flex items-center justify-center text-[11px] text-gray-400 font-bold">
                    <i class="fas fa-arrows-alt-h mr-2"></i> 左右にめくるとカレンダーが見れます <i class="fas fa-arrows-alt-h ml-2"></i>
                </div>
            </div>
        </section>

        <section class="mb-12">
            <div class="month-slider" id="month-slider"></div>
        </section>
    </main>

    <footer class="pb-8 text-center opacity-40">
        <p class="text-[10px]
